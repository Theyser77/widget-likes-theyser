<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@700&family=JetBrains+Mono:wght@700&family=Oswald:wght@700&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --fonte-principal: 'Rajdhani', sans-serif;
    --fonte-numeros: 'Share Tech Mono', monospace;
    --cor-chamada: #ffffff;
    --cor-like: #00ff00;
    --cor-numeros: #ffffff;
    --tamanho-texto: 20px;
    --tamanho-numeros: 40px;
  }

  body {
    background: transparent;
    font-family: var(--fonte-principal);
    overflow: hidden;
  }

  /* ========== WIDGET ========== */
  .widget-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 480px;
    height: 110px;
    background-color: #000;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .barra-progresso {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    background-color: #ff0000;
    transition: width 1.5s ease-in-out;
    z-index: 1;
  }

  .icone-like-svg {
    position: absolute;
    left: 20px;
    top: 50%;
    width: 60px;
    z-index: 2;
    filter: brightness(0) invert(1);
    animation: wiggleFloat 3s ease-in-out infinite;
    transform-origin: center;
  }

  .area-textos {
    position: absolute;
    left: 100px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    color: white;
    display: flex;
    flex-direction: column;
  }

  .texto-chamada {
    font-size: var(--tamanho-texto);
    line-height: 1;
    font-family: var(--fonte-principal);
    font-weight: 700;
    color: var(--cor-chamada);
  }

  .verde { color: var(--cor-like); }

  .contador-likes {
    font-size: var(--tamanho-numeros);
    font-weight: 700;
    margin-top: 5px;
    line-height: 1;
    font-family: var(--fonte-numeros);
    color: var(--cor-numeros);
  }

  @keyframes wiggleFloat {
    0%, 100% { transform: translateY(-50%) rotate(0deg); }
    25%       { transform: translateY(-60%) rotate(-8deg); }
    75%       { transform: translateY(-40%) rotate(8deg); }
  }

  /* ========== PAINEL DE CONTROLE ========== */
  #painel {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 15px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    z-index: 999;
  }

  #painel h3 { grid-column: 1 / -1; font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }

  .secao { display: flex; flex-direction: column; gap: 8px; }
  .painel-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #888; }
  
  select, input[type="number"], .btn {
    background: #1a1a1a;
    border: 1px solid #333;
    color: #fff;
    padding: 5px;
    border-radius: 4px;
    outline: none;
  }

  .btn { cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 10px; }
  .btn:hover { background: #333; }
  .btn-green { color: #00ff44; border-color: #00ff44; }

  input[type="color"] { width: 30px; height: 30px; border: none; cursor: pointer; background: none; }
</style>
</head>
<body>

<div class="widget-container">
  <div id="progresso" class="barra-progresso"></div>
  <img src="https://www.svgrepo.com/show/415785/thumbsup-ui-like.svg" class="icone-like-svg">
  <div class="area-textos">
    <div class="texto-chamada">DEIXA O <span class="verde" id="span-like">LIKE!</span></div>
    <div class="contador-likes">
      <span id="atual">...</span> / <span id="meta">0</span>
    </div>
  </div>
</div>

<div id="painel">
  <h3>⚙ Customização Profissional</h3>

  <div class="secao">

    <div class="painel-row">
        <button class="btn btn-green" onclick="forcarAtualizacao()">↺ RECARREGAR LIVE</button>
    </div>
  </div>
</div>
