<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    font-family: 'Rajdhani', sans-serif;
  }

  /* ========== WIDGET ========== */
  .widget-container {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 480px;
    height: 110px;
    background-color: #000;
    border-radius: 8px;
    overflow: hidden;
  }

  .barra-progresso {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 0%;
    background-color: #ff0000;
    transition: width 1.5s ease-in-out;
    z-index: 1;
  }

  .icone-like-svg {
    position: absolute;
    left: 20px;
    top: 50%;
    width: 60px;
    z-index: 2;
    filter: brightness(0) invert(1);
    animation: wiggleFloat 3s ease-in-out infinite;
    transform-origin: center;
  }

  .area-textos {
    position: absolute;
    left: 100px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    color: white;
    display: flex;
    flex-direction: column;
  }

  .texto-chamada {
    font-size: 20px;
    line-height: 1;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--cor-chamada, #ffffff);
  }

  .verde { color: var(--cor-like, #00ff00); }

  .contador-likes {
    font-size: 40px;
    font-weight: 700;
    margin-top: 5px;
    line-height: 1;
    font-family: 'Share Tech Mono', monospace;
    color: var(--cor-numeros, #ffffff);
  }

  @keyframes wiggleFloat {
    0%, 100% { transform: translateY(-50%) rotate(0deg); }
    25%       { transform: translateY(-60%) rotate(-8deg); }
    75%       { transform: translateY(-40%) rotate(8deg); }
  }

  /* ========== PAINEL DE CONTROLE ========== */
  #painel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 560px;
    background: #0f0f0f;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  #painel h3 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #444;
    letter-spacing: 3px;
    text-transform: uppercase;
    border-bottom: 1px solid #1a1a1a;
    padding-bottom: 8px;
  }

  .painel-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .painel-label {
    font-size: 12px;
    color: #666;
    font-family: 'Share Tech Mono', monospace;
    min-width: 120px;
    letter-spacing: 1px;
  }

  #status-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 20px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.3s;
  }
  .status-online  { background: #0a2a0a; color: #00ff44; border: 1px solid #00ff44; }
  .status-offline { background: #2a1a00; color: #ff8800; border: 1px solid #ff8800; }
  .status-erro    { background: #2a0000; color: #ff3333; border: 1px solid #ff3333; }
  .status-aguard  { background: #1a1a2a; color: #6666ff; border: 1px solid #6666ff; }

  #video-id-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #444;
    margin-left: 4px;
  }

  #sim-range {
    -webkit-appearance: none;
    width: 180px;
    height: 4px;
    background: #222;
    border-radius: 2px;
    outline: none;
  }
  #sim-range::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #ff3333;
    cursor: pointer;
  }
  #sim-valor {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: #ff3333;
    min-width: 50px;
  }

  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 5px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-sim    { background: #ff3333; color: #fff; }
  .btn-sim:hover { background: #ff5555; }
  .btn-real   { background: #1a1a1a; color: #888; border: 1px solid #333; }
  .btn-real:hover { background: #222; color: #aaa; }
  .btn-refresh { background: #1a2a1a; color: #00ff44; border: 1px solid #00ff44; }
  .btn-refresh:hover { background: #223322; }

  .cor-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cor-group label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
  }
  input[type="color"] {
    -webkit-appearance: none;
    width: 30px; height: 30px;
    border: 1px solid #333;
    border-radius: 6px;
    padding: 2px;
    background: #111;
    cursor: pointer;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }

  #meta-input {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    background: #111;
    border: 1px solid #333;
    border-radius: 6px;
    color: #fff;
    padding: 4px 10px;
    width: 100px;
    outline: none;
  }
  #meta-input:focus { border-color: #555; }

  .divisor { width: 100%; height: 1px; background: #1a1a1a; }
</style>
</head>
<body>

<!-- WIDGET -->
<div class="widget-container">
  <div id="progresso" class="barra-progresso"></div>
  <img src="https://www.svgrepo.com/show/415785/thumbsup-ui-like.svg" class="icone-like-svg">
  <div class="area-textos">
    <div class="texto-chamada">DEIXA O <span class="verde">LIKE!</span></div>
    <div class="contador-likes">
      <span id="atual">...</span> / <span id="meta">0</span>
    </div>
  </div>
</div>

<!-- PAINEL (some no OBS automaticamente) -->
<div id="painel">
  <h3>⚙ Painel de Controle — Widget Likes</h3>

  <div class="painel-row">
    <span class="painel-label">STATUS API</span>
    <span id="status-badge" class="status-aguard">AGUARDANDO</span>
    <span id="video-id-display"></span>
  </div>

  <div class="divisor"></div>

  <div class="painel-row">
    <span class="painel-label">SIMULAR LIKES</span>
    <input type="range" id="sim-range" min="0" max="10000" value="500">
    <span id="sim-valor">500</span>
    <button class="btn btn-sim" onclick="simularLikes()">SIMULAR</button>
    <button class="btn btn-real" onclick="voltarReal()">REAL</button>
    <button class="btn btn-refresh" onclick="forcarAtualizacao()">↺ ATUALIZAR</button>
  </div>

  <div class="divisor"></div>

  <div class="painel-row">
    <span class="painel-label">META DE LIKES</span>
    <input type="number" id="meta-input" value="2000" min="1">
    <button class="btn btn-real" onclick="aplicarMeta()" style="border-color:#6666ff;color:#6666ff;">APLICAR</button>
  </div>

  <div class="divisor"></div>

  <div class="painel-row">
    <span class="painel-label">CORES</span>
    <div class="cor-group">
      <label>TEXTO</label>
      <input type="color" id="cor-chamada" value="#ffffff" oninput="aplicarCores()">
    </div>
    <div class="cor-group">
      <label>LIKE!</label>
      <input type="color" id="cor-like" value="#00ff00" oninput="aplicarCores()">
    </div>
    <div class="cor-group">
      <label>NÚMEROS</label>
      <input type="color" id="cor-numeros" value="#ffffff" oninput="aplicarCores()">
    </div>
    <div class="cor-group">
      <label>BARRA</label>
      <input type="color" id="cor-barra" value="#ff0000" oninput="aplicarCores()">
    </div>
  </div>
</div>

<script>
  // ========== CONFIGURAÇÕES ==========
  const API_KEY    = "AIzaSyCRU3nsWj1uZcfLQfOxFOzX8IRxr_C1--s";
  const CHANNEL_ID = "UCjrBK9DwokyeeIIECJvaFyQ";
  let META_LIKES   = 2000;
  // ====================================

  let liveVideoId  = null;
  let modoSimulado = false;

  // Detecta OBS e esconde painel
  if (navigator.userAgent.includes("OBS")) {
    document.getElementById('painel').style.display = 'none';
  }

  // Slider
  document.getElementById('sim-range').addEventListener('input', function() {
    document.getElementById('sim-valor').innerText = parseInt(this.value).toLocaleString('pt-BR');
  });

  function setStatus(tipo, texto, videoId) {
    const badge = document.getElementById('status-badge');
    badge.className = 'status-' + tipo;
    badge.innerText = texto;
    document.getElementById('video-id-display').innerText = videoId ? '• ' + videoId : '';
  }

  function aplicarCores() {
    const r = document.documentElement.style;
    r.setProperty('--cor-chamada', document.getElementById('cor-chamada').value);
    r.setProperty('--cor-like',    document.getElementById('cor-like').value);
    r.setProperty('--cor-numeros', document.getElementById('cor-numeros').value);
    document.getElementById('progresso').style.backgroundColor = document.getElementById('cor-barra').value;
  }

  function aplicarMeta() {
    META_LIKES = parseInt(document.getElementById('meta-input').value) || 2000;
    document.getElementById('meta').innerText = META_LIKES.toLocaleString('pt-BR');
  }

  function simularLikes() {
    modoSimulado = true;
    const val = parseInt(document.getElementById('sim-range').value);
    updateUI(val, META_LIKES);
    setStatus('aguard', 'SIMULANDO', null);
  }

  function voltarReal() {
    modoSimulado = false;
    setStatus('aguard', 'AGUARDANDO', null);
    init();
  }

  async function forcarAtualizacao() {
    if (modoSimulado) return;
    liveVideoId = null;
    setStatus('aguard', 'BUSCANDO...', null);
    await buscarLiveId();
    if (liveVideoId) await atualizarLikes();
  }

  async function buscarLiveId() {
    try {
      const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&maxResults=1&key=${API_KEY}`);
      const data = await r.json();

      if (data.error) {
        document.getElementById('atual').innerText = "ERRO " + data.error.code;
        setStatus('erro', 'ERRO ' + data.error.code, null);
        liveVideoId = null;
        return;
      }

      if (!data.items || data.items.length === 0) {
        document.getElementById('atual').innerText = "OFFLINE";
        setStatus('offline', 'OFFLINE', null);
        liveVideoId = null;
        return;
      }

      liveVideoId = data.items[0].id.videoId;
      setStatus('aguard', 'LIVE ENCONTRADA', liveVideoId);

    } catch (e) {
      document.getElementById('atual').innerText = "OFFLINE";
      setStatus('erro', 'ERRO REDE', null);
      liveVideoId = null;
    }
  }

  async function atualizarLikes() {
    if (!liveVideoId || modoSimulado) return;
    try {
      const r = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${liveVideoId}&key=${API_KEY}`);
      const data = await r.json();

      if (!data.items || data.items.length === 0) {
        document.getElementById('atual').innerText = "OFFLINE";
        setStatus('offline', 'OFFLINE', null);
        liveVideoId = null;
        return;
      }

      const video = data.items[0];

      if (video.snippet.liveBroadcastContent !== "live") {
        document.getElementById('atual').innerText = "OFFLINE";
        setStatus('offline', 'LIVE ENCERRADA', null);
        liveVideoId = null;
        return;
      }

      updateUI(video.statistics.likeCount, META_LIKES);
      setStatus('online', 'ON LINE', liveVideoId);

    } catch (e) {
      document.getElementById('atual').innerText = "OFFLINE";
      setStatus('erro', 'ERRO REDE', null);
    }
  }

  function updateUI(cur, max) {
    document.getElementById('atual').innerText = parseInt(cur).toLocaleString('pt-BR');
    document.getElementById('meta').innerText  = parseInt(max).toLocaleString('pt-BR');
    document.getElementById('progresso').style.width = Math.min((cur / max) * 100, 100) + "%";
  }

  async function init() {
    if (modoSimulado) return;
    await buscarLiveId();
    if (liveVideoId) await atualizarLikes();
  }

  setInterval(async () => {
    if (modoSimulado) return;
    if (liveVideoId) await atualizarLikes();
    else { await buscarLiveId(); if (liveVideoId) await atualizarLikes(); }
  }, 60000);

  setInterval(async () => {
    if (modoSimulado) return;
    liveVideoId = null;
    await buscarLiveId();
    if (liveVideoId) await atualizarLikes();
  }, 600000);

  init();
</script>
</body>
</html>
